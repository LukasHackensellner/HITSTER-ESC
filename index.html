<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HITSTER ESC Player</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{font-family:system-ui;background:#111;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
main{text-align:center;max-width:700px;padding:24px}
button{padding:14px 22px;border-radius:999px;border:0;font-weight:700;cursor:pointer;margin:6px}
.green{background:#1DB954;color:#111}
.white{background:#fff;color:#111}
#reader{max-width:420px;margin:20px auto;display:none}
</style>
</head>
<body>
<main>
<h1>HITSTER ESC</h1>
<p id="status">Bereit.</p>

<button id="loginBtn" class="green" hidden>Mit Spotify verbinden</button>
<button id="scanBtn" class="white">QR scannen</button>
<button id="clearBtn" class="white">Cache löschen</button>

<div id="reader"></div>
</main>

<script>
const CLIENT_ID = "fa347d2153ab4389be371084945cdd99";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = "user-modify-playback-state user-read-playback-state";

const statusEl = document.getElementById("status");
const loginBtn = document.getElementById("loginBtn");
const scanBtn = document.getElementById("scanBtn");
const clearBtn = document.getElementById("clearBtn");

function status(t){statusEl.textContent=t}

clearBtn.onclick=()=>{
 localStorage.clear();
 status("Cache gelöscht.");
};

function parseQuery(text){
 try{
   const u=new URL(text);
   return u.searchParams.get("q");
 }catch(e){
   return text;
 }
}

async function sha256(plain){
 return crypto.subtle.digest("SHA-256",new TextEncoder().encode(plain));
}

function base64url(buf){
 return btoa(String.fromCharCode(...new Uint8Array(buf)))
 .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

async function login(){
 const verifier=Math.random().toString(36).repeat(4);
 localStorage.setItem("verifier",verifier);

 const challenge=base64url(await sha256(verifier));

 const url=new URL("https://accounts.spotify.com/authorize");
 url.searchParams.set("client_id",CLIENT_ID);
 url.searchParams.set("response_type","code");
 url.searchParams.set("redirect_uri",REDIRECT_URI);
 url.searchParams.set("scope",SCOPES);
 url.searchParams.set("code_challenge_method","S256");
 url.searchParams.set("code_challenge",challenge);

 location.href=url.toString();
}

async function exchange(code){
 const body=new URLSearchParams();
 body.set("client_id",CLIENT_ID);
 body.set("grant_type","authorization_code");
 body.set("code",code);
 body.set("redirect_uri",REDIRECT_URI);
 body.set("code_verifier",localStorage.getItem("verifier"));

 const res=await fetch("https://accounts.spotify.com/api/token",{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body
 });

 const data=await res.json();

 localStorage.setItem("token",data.access_token);
 localStorage.setItem("expires",Date.now()+data.expires_in*1000);

 return data.access_token;
}

async function token(){
 const t=localStorage.getItem("token");
 const exp=Number(localStorage.getItem("expires")||0);
 if(t && Date.now()<exp) return t;
 return null;
}

async function resolveTrack(tok,q){
 const parts=q.split(" ");
 const artist=parts[0];
 const title=parts.slice(1).join(" ");

 const search=`track:"${title}" artist:"${artist}"`;

 const u=new URL("https://api.spotify.com/v1/search");
 u.searchParams.set("type","track");
 u.searchParams.set("limit","1");
 u.searchParams.set("q",search);

 const res=await fetch(u,{
   headers:{Authorization:`Bearer ${tok}`}
 });

 const data=await res.json();

 if(!data.tracks || !data.tracks.items.length){
   throw new Error("Kein Song gefunden");
 }

 return data.tracks.items[0].uri;
}

async function play(uri){
 const tok=await token();

 if(!tok){
   status("Mit Spotify verbinden.");
   loginBtn.hidden=false;
   return;
 }

 status("Suche Lied…");

 const track=await resolveTrack(tok,uri);

 status("Starte Wiedergabe…");

 const res=await fetch("https://api.spotify.com/v1/me/player/play",{
  method:"PUT",
  headers:{
   Authorization:`Bearer ${tok}`,
   "Content-Type":"application/json"
  },
  body:JSON.stringify({uris:[track]})
 });

 if(res.status===204){
   status("🎵");
 }else if(res.status===404){
   status("Spotify öffnen und erneut scannen.");
 }else{
   status("Fehler beim Starten.");
 }
}

scanBtn.onclick=async()=>{
 const reader=document.getElementById("reader");
 reader.style.display="block";

 const scanner=new Html5Qrcode("reader");

 await scanner.start(
  {facingMode:"environment"},
  {fps:10,qrbox:{width:250,height:250}},
  async text=>{
    await scanner.stop();
    reader.style.display="none";

    try{
      const q=parseQuery(text);
      await play(q);
    }catch(e){
      console.error(e);
      status("Scan-Fehler.");
    }
  }
 );
};

(async()=>{
 const params=new URLSearchParams(location.search);
 const code=params.get("code");

 if(code){
   await exchange(code);
   history.replaceState({},document.title,REDIRECT_URI);
   status("Verbunden. QR scannen.");
 }

 if(CLIENT_ID==="DEINE_SPOTIFY_CLIENT_ID_HIER"){
   status("CLIENT_ID eintragen.");
 }
})();
</script>
</body>
</html>
