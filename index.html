<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HITSTER ESC Spotify Player</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:#111;color:white;display:grid;min-height:100vh;place-items:center}
main{max-width:620px;padding:32px;text-align:center}
button{font-size:18px;border:0;border-radius:999px;padding:14px 24px;background:#1DB954;color:#111;font-weight:800;cursor:pointer}
code{background:#222;padding:2px 6px;border-radius:6px}
.small{opacity:.75;font-size:14px;line-height:1.5}
.status{margin:20px 0;font-size:18px}
</style>
</head>
<body>
<main>
<h1>HITSTER ESC Player</h1>
<p class="status" id="status">Bereit.</p>
<button id="loginBtn" hidden>Mit Spotify verbinden</button>
<p class="small">
QR-Formate:<br>
<code>?track=spotify:track:TRACK_ID</code><br>
<code>?q=Artist%20Titel</code>
</p>
</main>
<script>
const CLIENT_ID = "DEINE_SPOTIFY_CLIENT_ID_HIER";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPES = ["user-modify-playback-state","user-read-playback-state"].join(" ");
const statusEl=document.getElementById("status");
const loginBtn=document.getElementById("loginBtn");
const params=new URLSearchParams(window.location.search);
const rawTrack=params.get("track");
const rawQuery=params.get("q");
const code=params.get("code");
function setStatus(t){statusEl.textContent=t}
function base64urlencode(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"")}
async function sha256(plain){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(plain))}
function randomString(len=64){const c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";const v=crypto.getRandomValues(new Uint8Array(len));return[...v].map(x=>c[x%c.length]).join("")}
async function login(){
  const verifier=randomString();
  localStorage.setItem("spotify_pkce_verifier",verifier);
  if(rawTrack)localStorage.setItem("pending_track",rawTrack);
  if(rawQuery)localStorage.setItem("pending_query",rawQuery);
  const challenge=base64urlencode(await sha256(verifier));
  const url=new URL("https://accounts.spotify.com/authorize");
  url.searchParams.set("response_type","code");
  url.searchParams.set("client_id",CLIENT_ID);
  url.searchParams.set("scope",SCOPES);
  url.searchParams.set("redirect_uri",REDIRECT_URI);
  url.searchParams.set("code_challenge_method","S256");
  url.searchParams.set("code_challenge",challenge);
  location.href=url.toString();
}
async function getTokenFromCode(authCode){
  const body=new URLSearchParams();
  body.set("client_id",CLIENT_ID);
  body.set("grant_type","authorization_code");
  body.set("code",authCode);
  body.set("redirect_uri",REDIRECT_URI);
  body.set("code_verifier",localStorage.getItem("spotify_pkce_verifier"));
  const res=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  if(!res.ok)throw new Error(await res.text());
  const data=await res.json();
  localStorage.setItem("spotify_access_token",data.access_token);
  localStorage.setItem("spotify_token_expires_at",String(Date.now()+data.expires_in*1000));
  if(data.refresh_token)localStorage.setItem("spotify_refresh_token",data.refresh_token);
  return data.access_token;
}
async function getAccessToken(){
  const token=localStorage.getItem("spotify_access_token");
  const exp=Number(localStorage.getItem("spotify_token_expires_at")||0);
  if(token&&Date.now()<exp-60000)return token;
  const refresh=localStorage.getItem("spotify_refresh_token");
  if(!refresh)return null;
  const body=new URLSearchParams();
  body.set("client_id",CLIENT_ID);
  body.set("grant_type","refresh_token");
  body.set("refresh_token",refresh);
  const res=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  if(!res.ok)return null;
  const data=await res.json();
  localStorage.setItem("spotify_access_token",data.access_token);
  localStorage.setItem("spotify_token_expires_at",String(Date.now()+data.expires_in*1000));
  if(data.refresh_token)localStorage.setItem("spotify_refresh_token",data.refresh_token);
  return data.access_token;
}
async function resolveTrack(accessToken,q){
  setStatus("Suche Track auf Spotify…");
  const url=new URL("https://api.spotify.com/v1/search");
  url.searchParams.set("type","track");
  url.searchParams.set("limit","1");
  url.searchParams.set("q",q);
  const res=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!res.ok)throw new Error(await res.text());
  const data=await res.json();
  const item=data.tracks?.items?.[0];
  if(!item)throw new Error("Kein Spotify-Track gefunden: "+q);
  setStatus("Gefunden: "+item.name+" – "+item.artists.map(a=>a.name).join(", "));
  return item.uri;
}
async function playTrack(accessToken,trackUri){
  setStatus("Starte Wiedergabe…");
  const res=await fetch("https://api.spotify.com/v1/me/player/play",{method:"PUT",headers:{Authorization:`Bearer ${accessToken}`,"Content-Type":"application/json"},body:JSON.stringify({uris:[trackUri]})});
  if(res.status===204){setStatus("Lied gestartet 🎵");return}
  if(res.status===404){setStatus("Kein aktives Spotify-Gerät gefunden. Öffne Spotify und scanne erneut.");return}
  if(res.status===403){setStatus("Spotify Premium nötig oder Playback verweigert.");return}
  throw new Error(await res.text());
}
async function init(){
  if(CLIENT_ID==="DEINE_SPOTIFY_CLIENT_ID_HIER"){setStatus("Bitte CLIENT_ID in index.html eintragen.");return}
  let token=await getAccessToken();
  if(code){
    token=await getTokenFromCode(code);
    const pTrack=localStorage.getItem("pending_track");
    const pQuery=localStorage.getItem("pending_query");
    const qs=pTrack?("?track="+encodeURIComponent(pTrack)):(pQuery?("?q="+encodeURIComponent(pQuery)):"");
    history.replaceState({},document.title,REDIRECT_URI+qs);
  }
  let track=rawTrack||localStorage.getItem("pending_track");
  let query=rawQuery||localStorage.getItem("pending_query");
  if(!track&&!query){setStatus("Kein Track/keine Suche im QR-Link gefunden.");return}
  if(!token){setStatus("Einmal mit Spotify verbinden.");loginBtn.hidden=false;loginBtn.onclick=login;return}
  if(!track)track=await resolveTrack(token,query);
  await playTrack(token,track);
}
init().catch(e=>{console.error(e);setStatus("Fehler: "+e.message);loginBtn.hidden=false;loginBtn.onclick=login});
</script>
</body>
</html>
